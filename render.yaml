services:
  - type: web
    name: neuro-symbolic-rag-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: LLM_PROVIDER
        value: groq
      - key: LLM_MODEL
        value: llama-3.1-8b-instant
      - key: GROQ_API_KEY
        sync: false          # set manually in Render dashboard — never commit the value
      - key: ALLOWED_ORIGINS
        value: https://your-frontend.vercel.app  # update after Vercel deploy
