[theme]
primaryColor        = "#4CAF50"
backgroundColor     = "#0e1117"
secondaryBackgroundColor = "#1a1a2e"
textColor           = "#FAFAFA"
font                = "sans serif"

[server]
headless            = true
enableCORS          = false
enableXsrfProtection = true
maxUploadSize       = 50

[browser]
gatherUsageStats    = false
